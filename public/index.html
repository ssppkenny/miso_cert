<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cert Quiz</title>
    <script>
      // Hide quiz images that fail to load (404 etc.) using capture phase
      // because the 'error' event on <img> does not bubble.
      window.addEventListener('error', function(e) {
        if (e.target && e.target.tagName === 'IMG' && e.target.hasAttribute('data-quiz-img')) {
          e.target.style.display = 'none';
        }
      }, true);
    </script>
  </head>
  <body>
    <script src="/index.js" type="module"></script>
  </body>
</html>
